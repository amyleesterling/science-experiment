<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eyewire II — three.js × Neuroglancer</title>
    <style>
      html, body { margin: 0; height: 100%; background: #04060c; color: #f5f5fa; font-family: system-ui, sans-serif; }
      #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
      #ng-frame {
        position: absolute; inset: 0; width: 100%; height: 100%;
        border: 0;
        z-index: 1;
      }
      #overlay-canvas {
        position: absolute; inset: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 2;
      }
      #toolbar {
        position: absolute; top: 12px; left: 12px;
        display: flex; gap: 8px;
        z-index: 3;
        font-size: 12px;
      }
      #toolbar button {
        padding: 6px 10px;
        background: rgba(20, 28, 48, 0.85);
        color: #e8eaff;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 6px;
        cursor: pointer;
        backdrop-filter: blur(6px);
      }
      #toolbar button:hover { background: rgba(40, 50, 80, 0.9); }
      #status {
        position: absolute; bottom: 12px; left: 12px;
        font-family: ui-monospace, monospace; font-size: 11px;
        color: rgba(255,255,255,0.6);
        background: rgba(20,28,48,0.7);
        padding: 6px 10px;
        border-radius: 6px;
        z-index: 3;
        max-width: 60vw;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <iframe id="ng-frame" src="" title="Neuroglancer"></iframe>
      <canvas id="overlay-canvas"></canvas>
      <div id="toolbar">
        <button id="btn-sync">Sync once</button>
        <button id="btn-live">Toggle live sync</button>
      </div>
      <div id="status">phase 0 — open the console for camera state</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
